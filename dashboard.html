<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DropCollect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070f; --surface: #0e0e1c; --card: #141424; --border: rgba(255,255,255,0.07);
      --accent: #4dffcc; --accent-dim: rgba(77,255,204,0.1); --accent-pro: #ff5fa0;
      --text: #e2e2ef; --muted: #6b6b99; --radius: 12px; --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px); background-size: 64px 64px; }
    main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 48px 32px 80px; }

    nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; background: rgba(7,7,15,0.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); z-index: 100; }
    .logo { font-size: 17px; font-weight: 800; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.2s; }
    nav a.back:hover { color: var(--text); }

    /* States */
    .state { text-align: center; padding: 80px 20px; }
    .state-icon { font-size: 48px; margin-bottom: 20px; }
    .state h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .state p { color: var(--muted); font-size: 15px; line-height: 1.7; max-width: 380px; margin: 0 auto 24px; }
    .state input { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px; outline: none; width: 280px; transition: border-color 0.2s; text-align: center; }
    .state input:focus { border-color: var(--accent); }
    .state input::placeholder { color: var(--muted); }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; outline: none; text-decoration: none; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: #6fffda; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.14); color: var(--text); }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 80px 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(77,255,204,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-text { color: var(--muted); font-size: 14px; }

    /* Dashboard content */
    .dash-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; padding-top: 80px; }
    .dash-id { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; }
    .dash-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
    .dash-meta { font-size: 13px; color: var(--muted); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
    .stat-val { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-bar-wrap { height: 4px; background: var(--surface); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .stat-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }

    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); }
    .table-title { font-size: 14px; font-weight: 700; }
    .table-actions { display: flex; gap: 10px; align-items: center; }

    .search-input { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; outline: none; width: 200px; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 12px 24px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 14px 24px; font-size: 14px; }
    .email-cell { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
    .time-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
    .num-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
    .empty-table { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-table .e-icon { font-size: 32px; margin-bottom: 14px; }
    .empty-table p { font-size: 14px; line-height: 1.7; }

    .cap-warning { display: flex; align-items: center; gap: 12px; background: rgba(255,95,160,0.07); border: 1px solid rgba(255,95,160,0.2); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 24px; font-size: 14px; }
    .cap-warning strong { color: var(--accent-pro); }

    .collector-info { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .info-item label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 5px; }
    .info-item span { font-size: 14px; font-weight: 600; }
    .badge-style { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; background: var(--accent-dim); border: 1px solid rgba(77,255,204,0.25); border-radius: 100px; font-size: 12px; color: var(--accent); font-weight: 700; }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      main { padding: 40px 16px 60px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .collector-info { grid-template-columns: 1fr; }
      .dash-header { padding-top: 72px; }
      .table-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <nav>
    <a href="/" class="logo">Drop<span>Collect</span></a>
    <a href="/" class="back">← Create new collector</a>
  </nav>
  <main id="app">
    <!-- Dynamic content injected by JS -->
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    let collectorId = params.get('id');
    let allEmails = [];
    let filtered = [];

    const app = document.getElementById('app');

    function render(html) { app.innerHTML = html; }

    function showLoading() {
      render(`<div class="spinner-wrap"><div class="spinner"></div><div class="spin-text">Loading your dashboard…</div></div>`);
    }

    function showNoId() {
      render(`
        <div class="state">
          <div class="state-icon">🔍</div>
          <h2>Enter your Collector ID</h2>
          <p>Paste your collector ID to view collected emails. It's the 8-character code from your dashboard URL.</p>
          <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:8px;">
            <input type="text" id="id-input" placeholder="e.g. abc12345" maxlength="12" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9]/g,'')">
            <button class="btn btn-primary" onclick="loadById()">View Dashboard</button>
          </div>
        </div>`);
    }

    function loadById() {
      const val = document.getElementById('id-input')?.value?.trim();
      if (!val) return;
      collectorId = val;
      history.replaceState(null, '', `?id=${val}`);
      loadDashboard();
    }

    function showNotFound() {
      render(`
        <div class="state">
          <div class="state-icon">🔒</div>
          <h2>Collector not found</h2>
          <p>No collector exists with that ID, or it may have been deleted. Double-check the URL you bookmarked.</p>
          <a href="/" class="btn btn-primary">Create a new collector</a>
        </div>`);
    }

    function showError(msg) {
      render(`
        <div class="state">
          <div class="state-icon">⚠️</div>
          <h2>Something went wrong</h2>
          <p>${msg}</p>
          <button class="btn btn-ghost" onclick="loadDashboard()">Try again</button>
        </div>`);
    }

    async function loadDashboard() {
      if (!collectorId) { showNoId(); return; }
      showLoading();
      try {
        const res = await fetch(`/api/emails?id=${collectorId}`);
        if (res.status === 404) { showNotFound(); return; }
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();
        allEmails = data.emails || [];
        filtered = [...allEmails];
        renderDashboard(data);
      } catch (e) {
        showError(e.message);
      }
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
             ' · ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDateShort(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderDashboard(data) {
      const c = data.collector;
      const emails = data.emails || [];
      const count = emails.length;
      const cap = c.email_cap;
      const pct = cap ? Math.round((count / cap) * 100) : 0;
      const atCap = cap && count >= cap;

      const styleLabel = c.widget_style === 'card' ? 'Card' : 'Minimal';
      const tierLabel = { free: 'Free', pro: 'Pro', pro_plus: 'Pro Plus' }[c.tier] || c.tier;

      app.innerHTML = `
        <div class="dash-header">
          <div>
            <div class="dash-id">COLLECTOR / ${collectorId}</div>
            <div class="dash-title">${c.headline || 'Email Collector'}</div>
            <div class="dash-meta">Created ${formatDateShort(c.created_at)} · ${tierLabel} plan</div>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-ghost btn-sm" onclick="loadDashboard()">↺ Refresh</button>
            <button class="btn btn-primary btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
          </div>
        </div>

        ${atCap ? `<div class="cap-warning">⚠ <div>You've reached your <strong>${cap}-email cap</strong>. The widget is now showing a "we're at capacity" message. <a href="/#pricing" style="color:var(--accent-pro);text-decoration:none;font-weight:700;">Upgrade to Pro</a> to remove the limit.</div></div>` : ''}

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Emails Collected</div>
            <div class="stat-val">${count.toLocaleString()}</div>
            <div class="stat-sub">${cap ? `of ${cap} cap` : 'unlimited'}</div>
            ${cap ? `<div class="stat-bar-wrap"><div class="stat-bar" id="fill-bar" style="width:0%"></div></div>` : ''}
          </div>
          <div class="stat-card">
            <div class="stat-label">Widget Style</div>
            <div style="margin-top:8px;"><span class="badge-style">◈ ${styleLabel}</span></div>
            <div class="stat-sub" style="margin-top:8px;">${c.button_color ? `Button: ${c.button_color}` : ''}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Latest Submission</div>
            <div class="stat-val" style="font-size:18px;letter-spacing:-0.5px;margin-top:4px;">${emails.length ? formatDateShort(emails[0].collected_at) : '—'}</div>
            <div class="stat-sub">${emails.length ? emails[0].email.substring(0, 24) + (emails[0].email.length > 24 ? '…' : '') : 'No emails yet'}</div>
          </div>
        </div>

        <div class="table-wrap">
          <div class="table-header">
            <div class="table-title">Collected Emails <span style="color:var(--muted);font-weight:400;font-size:13px;margin-left:8px;">(${count})</span></div>
            <div class="table-actions">
              ${count > 0 ? `<input class="search-input" placeholder="Filter emails…" oninput="filterEmails(this.value)" id="search">` : ''}
            </div>
          </div>
          <div id="table-body">${renderTable(emails)}</div>
        </div>

        <div style="margin-top:24px;padding:18px 22px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;">Your Embed Snippet</div>
          <code style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);word-break:break-all;display:block;" id="snip-code"></code>
          <button class="btn btn-ghost btn-sm" style="margin-top:12px;" onclick="copySnippet()">Copy snippet</button>
        </div>
      `;

      // Set snippet
      const origin = location.origin;
      document.getElementById('snip-code').textContent = `<script src="${origin}/c.js?id=${collectorId}"><\/script>`;

      // Animate bar
      if (cap) {
        setTimeout(() => {
          const bar = document.getElementById('fill-bar');
          if (bar) bar.style.width = pct + '%';
          if (pct > 80) bar.style.background = 'var(--accent-pro)';
          if (pct >= 100) bar.style.background = '#ef4444';
        }, 100);
      }
    }

    function renderTable(emails) {
      if (!emails.length) {
        return `<div class="empty-table"><div class="e-icon">📭</div><p>No emails collected yet.<br>Paste your snippet on a website to start collecting.</p></div>`;
      }
      const rows = emails.map((e, i) => `
        <tr>
          <td class="num-cell">${String(i + 1).padStart(3, '0')}</td>
          <td class="email-cell">${escHtml(e.email)}</td>
          <td class="time-cell">${formatDate(e.collected_at)}</td>
        </tr>`).join('');
      return `<table><thead><tr><th>#</th><th>Email</th><th>Collected</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function filterEmails(q) {
      const term = q.toLowerCase();
      filtered = term ? allEmails.filter(e => e.email.toLowerCase().includes(term)) : [...allEmails];
      document.getElementById('table-body').innerHTML = renderTable(filtered);
    }

    function exportCSV() {
      if (!allEmails.length) { alert('No emails to export.'); return; }
      const rows = [['email', 'collected_at'], ...allEmails.map(e => [e.email, e.collected_at])];
      const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      a.download = `dropcollect-${collectorId}-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    function copySnippet() {
      const text = document.getElementById('snip-code')?.textContent;
      if (text) navigator.clipboard.writeText(text);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadDashboard();
  </script>
</body>
</html>
