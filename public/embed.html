<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropCollect Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: transparent; }
    body { display: flex; align-items: center; justify-content: center; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #widget-root { width: 100%; }

    /* Widget styles — same as c.js but inlined for iframe context */
    .dc-minimal { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .dc-minimal .dc-input { flex: 1; min-width: 180px; padding: 10px 14px; border: 1.5px solid rgba(0,0,0,0.15); border-radius: 7px; font-size: 14px; font-family: inherit; outline: none; background: #fff; transition: border-color 0.2s; }
    .dc-minimal .dc-input:focus { border-color: var(--dc-color, #4dffcc); }
    .dc-minimal .dc-btn { padding: 10px 20px; background: var(--dc-color, #4dffcc); color: var(--dc-btn-text, #1a1a2e); border: none; border-radius: 7px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
    .dc-minimal .dc-btn:hover { opacity: 0.85; }
    .dc-minimal .dc-btn:disabled { opacity: 0.5; cursor: default; }

    .dc-card { background: #fff; border: 1px solid rgba(0,0,0,0.09); border-radius: 14px; padding: 24px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    .dc-card .dc-headline { font-size: 19px; font-weight: 700; margin-bottom: 5px; color: #111; }
    .dc-card .dc-sub { font-size: 14px; color: #666; margin-bottom: 16px; }
    .dc-card .dc-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .dc-card .dc-input { flex: 1; min-width: 160px; padding: 10px 14px; border: 1.5px solid rgba(0,0,0,0.15); border-radius: 7px; font-size: 14px; font-family: inherit; outline: none; background: #f8f8f8; transition: border-color 0.2s; }
    .dc-card .dc-input:focus { border-color: var(--dc-color, #4dffcc); background: #fff; }
    .dc-card .dc-btn { padding: 10px 20px; background: var(--dc-color, #4dffcc); color: var(--dc-btn-text, #1a1a2e); border: none; border-radius: 7px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
    .dc-card .dc-btn:hover { opacity: 0.85; }
    .dc-card .dc-btn:disabled { opacity: 0.5; cursor: default; }

    .dc-msg { font-size: 13px; margin-top: 8px; }
    .dc-msg.ok { color: #16a34a; }
    .dc-msg.err { color: #dc2626; }
    .dc-success { padding: 12px 16px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; color: #15803d; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .dc-cap { padding: 12px 16px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; color: #c2410c; font-size: 14px; }
    .dc-spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.15); border-top-color: rgba(0,0,0,0.5); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dc-loading { color: #999; font-size: 14px; text-align: center; padding: 20px; }
    .dc-error { color: #dc2626; font-size: 13px; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div id="widget-root"><div class="dc-loading">Loading…</div></div>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const BASE = location.origin;

    function btnTextColor(hex) {
      const h = hex.replace('#', '');
      const r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
      return (0.299*r + 0.587*g + 0.114*b) > 145 ? '#1a1a2e' : '#ffffff';
    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function init() {
      const root = document.getElementById('widget-root');
      if (!id) { root.innerHTML = '<div class="dc-error">No collector ID specified.</div>'; return; }

      try {
        const res = await fetch(`${BASE}/api/config?id=${id}`);
        if (!res.ok) throw new Error('not found');
        const config = await res.json();

        const btnColor = config.button_color || '#4dffcc';
        const btnLabel = config.button_label || 'Subscribe';
        document.documentElement.style.setProperty('--dc-color', btnColor);
        document.documentElement.style.setProperty('--dc-btn-text', btnTextColor(btnColor));

        if (config.widget_style === 'card') {
          root.innerHTML = `
            <div class="dc-card">
              ${config.headline ? `<div class="dc-headline">${esc(config.headline)}</div>` : ''}
              ${config.subheadline ? `<div class="dc-sub">${esc(config.subheadline)}</div>` : ''}
              <div class="dc-row">
                <input class="dc-input" type="email" placeholder="your@email.com">
                <button class="dc-btn">${esc(btnLabel)}</button>
              </div>
              <div class="dc-msg"></div>
            </div>`;
        } else {
          root.innerHTML = `
            <div class="dc-minimal">
              <input class="dc-input" type="email" placeholder="your@email.com">
              <button class="dc-btn">${esc(btnLabel)}</button>
            </div>
            <div class="dc-msg"></div>`;
        }

        const input = root.querySelector('.dc-input');
        const btn = root.querySelector('.dc-btn');
        const msg = root.querySelector('.dc-msg');
        const inner = root.querySelector('.dc-card') || root.querySelector('.dc-minimal');

        input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });

        btn.addEventListener('click', async () => {
          const email = input.value.trim();
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            msg.textContent = 'Please enter a valid email.';
            msg.className = 'dc-msg err';
            return;
          }
          btn.disabled = true;
          btn.innerHTML = '<span class="dc-spin"></span>';
          msg.className = 'dc-msg';

          try {
            const r = await fetch(`${BASE}/api/collect`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id, email }),
            });
            const data = await r.json();

            if (r.ok) {
              const s = document.createElement('div');
              s.className = 'dc-success';
              s.textContent = "✓ You're on the list!";
              if (config.widget_style === 'card') {
                inner.querySelector('.dc-row').style.display = 'none';
                inner.appendChild(s);
              } else {
                inner.style.display = 'none';
                root.insertBefore(s, msg);
              }
              msg.className = 'dc-msg';
            } else if (data.error === 'capacity_reached') {
              inner.innerHTML = '<div class="dc-cap">📬 We\'re at capacity — registrations are closed.</div>';
            } else if (data.error === 'already_subscribed') {
              msg.textContent = "You're already on the list!";
              msg.className = 'dc-msg ok';
              btn.disabled = false;
              btn.textContent = btnLabel;
            } else {
              msg.textContent = 'Something went wrong. Try again.';
              msg.className = 'dc-msg err';
              btn.disabled = false;
              btn.textContent = btnLabel;
            }
          } catch(e) {
            msg.textContent = 'Network error. Try again.';
            msg.className = 'dc-msg err';
            btn.disabled = false;
            btn.textContent = btnLabel;
          }
        });

      } catch(e) {
        root.innerHTML = '<div class="dc-error">Widget could not load.</div>';
      }
    }

    init();
  </script>
</body>
</html>
